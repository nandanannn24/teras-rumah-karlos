<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Admin - Teras Rumah Karlos">
    <title>Login Admin | Teras Rumah Karlos</title>
    <link rel="icon" type="image/webp" href="logo.webp">
    <meta property="og:title" content="Teras Rumah Karlos | Layanan Cetak & Kado">
    <meta property="og:description" content="Toko ATK, Buket Bunga, Fotokopi, dan Pass Foto terlengkap dan termurah. Pesan sekarang!">
    <meta property="og:image" content="https://teras-rumah-karlos.netlify.app/logo.webp">
    <meta property="og:url" content="https://teras-rumah-karlos.netlify.app/">
    <meta property="og:type" content="website">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-utama: #F9F8F6;
            --hijau-pekat: #2E5E3F;
            --hijau-hover: #3A7A52;
            --peach: #FFDAB9;
            --gold: #E2C275;
            --charcoal: #2D3436;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--hijau-pekat) 0%, #1a3a28 50%, #0f2419 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(226, 194, 117, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatBubble 8s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 218, 185, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatBubble 10s ease-in-out infinite reverse;
        }

        @keyframes floatBubble {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            max-width: 440px;
            width: 100%;
            position: relative;
            z-index: 2;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 1.2rem;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .login-card h2 {
            color: #fff;
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
        }

        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.88rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            font-size: 0.88rem;
            margin-bottom: 0.4rem;
            display: block;
        }

        .input-group-login {
            position: relative;
        }

        .input-group-login i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            z-index: 3;
        }

        .input-login {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 14px 16px 14px 48px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .input-login::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .input-login:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(226, 194, 117, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 3;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--gold);
        }

        .btn-login {
            width: 100%;
            background: var(--gold);
            color: var(--charcoal);
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: var(--peach);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(226, 194, 117, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #ff6b6b;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            display: none;
            margin-bottom: 1rem;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-top: 1.5rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        .credentials-hint {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .credentials-hint p {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.75rem;
            margin: 0;
        }

        .credentials-hint code {
            color: var(--gold);
            background: rgba(226, 194, 117, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .login-card {
                margin: 1rem;
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="text-center">
            <img src="logo.webp" alt="Logo Teras Rumah Karlos" class="login-logo" id="loginLogo">
            <h2>Login Admin</h2>
            <p class="subtitle">Masuk untuk mengelola pesanan, antrian & toko</p>
        </div>
        <div class="error-msg" id="errorMsg">
            <i class="bi bi-exclamation-circle"></i>
            <span id="errorText">Username atau password salah!</span>
        </div>
        <form id="formLogin" onsubmit="return prosesLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-group-login">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" class="input-login" id="username" placeholder="Masukkan username" required
                        autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group-login">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="input-login" id="password" placeholder="Masukkan password" required
                        autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
            </button>
        </form>
        <a href="index.html" class="back-link">
            <i class="bi bi-arrow-left me-1"></i>Kembali ke Beranda
        </a>
        <div class="credentials-hint">
            <p><i class="bi bi-info-circle me-1"></i>Demo: <code>admin</code> / <code>admin123</code> atau
                <code>staff</code> / <code>staff123</code></p>
        </div>
        <script>
            const dataAdmin = [
                { username: 'admin', password: 'admin123', nama: 'Karlos (Admin)' },
                { username: 'staff', password: 'staff123', nama: 'Staff Toko' }
            ];
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                window.location.href = 'dashboard-pesanan.html';
            }
            function togglePassword() {
                const input = document.getElementById('password');
                const icon = document.getElementById('eyeIcon');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'bi bi-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'bi bi-eye';
                }
            }
            function prosesLogin(event) {
                event.preventDefault();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const errorMsg = document.getElementById('errorMsg');
                const admin = dataAdmin.find(a =>
                    a.username === username && a.password === password
                );
                if (admin) {
                    localStorage.setItem('adminLoggedIn', 'true');
                    localStorage.setItem('adminNama', admin.nama);
                    localStorage.setItem('adminUsername', admin.username);
                    window.location.href = 'dashboard-pesanan.html';
                } else {
                    errorMsg.classList.add('show');
                    document.getElementById('errorText').textContent = 'Username atau password salah!';
                    document.querySelector('.login-card').style.animation = 'shake 0.4s ease';
                    setTimeout(() => {
                        document.querySelector('.login-card').style.animation = '';
                    }, 400);
                }
                return false;
            }
            const style = document.createElement('style');
            style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-8px); }
                75% { transform: translateX(8px); }
            }
        `;
            document.head.appendChild(style);
        </script>
</body>

</html>
